spring.application.name=bbk-runtime

# --- Datasource (MySQL local) ---
spring.datasource.url=jdbc:mysql://localhost:3306/bbk_runtime?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# auto-quote columnas que sean palabras reservadas (position, value, ...)
spring.jpa.properties.hibernate.auto_quote_keyword=true

# --- Seguridad / JWT ---
bbk.security.jwt.secret=dev-secret-change-me-in-prod-0123456789-abcdefghijklmnopqrstuvwxyz
bbk.security.jwt.ttl-minutes=120
# perfil "security officer" semilla, creado al arrancar si no existe
bbk.security.seed.user=QSECOFR
bbk.security.seed.password=qsecofr

# --- Logging a archivo (Logback, con rolling) ---
logging.file.name=logs/bbk-runtime.log
logging.logback.rollingpolicy.file-name-pattern=logs/bbk-runtime-%d{yyyy-MM-dd}.%i.log.gz
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=14
logging.logback.rollingpolicy.total-size-cap=200MB

